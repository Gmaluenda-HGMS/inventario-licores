<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a18;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e0dfd8;
      padding: 2rem 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #1a1a18;
    }

    .scores {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .score-card {
      background: #f5f5f0;
      border-radius: 8px;
      padding: 10px 20px;
      min-width: 80px;
    }

    .score-card.active-x .score-label { color: #185fa5; }
    .score-card.active-o .score-label { color: #993c1d; }

    .score-label { font-size: 12px; color: #888780; }
    .score-val   { font-size: 22px; font-weight: 500; }

    .draws-card {
      background: transparent;
      padding: 10px 12px;
    }
    .draws-card .score-val { font-size: 18px; }

    .status {
      font-size: 18px;
      font-weight: 500;
      min-height: 28px;
      margin-bottom: 1.25rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 6px;
      margin: 0 auto 1.5rem;
      width: fit-content;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: #f5f5f0;
      border: 0.5px solid #e0dfd8;
      border-radius: 8px;
      font-size: 40px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #fff;
      border-color: #c8c7c0;
    }

    .cell.taken  { cursor: default; }
    .cell.x-cell { color: #185fa5; }
    .cell.o-cell { color: #993c1d; }

    .cell.win-cell {
      background: #eaf3de;
      border-color: #639922;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 0.5px solid #c8c7c0;
      background: transparent;
      color: #1a1a18;
      font-family: inherit;
      transition: background 0.1s;
    }

    button:hover   { background: #f5f5f0; }
    button:active  { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>

    <div class="scores">
      <div class="score-card" id="card-x">
        <div class="score-label">Jugador X</div>
        <div class="score-val" id="score-x">0</div>
      </div>
      <div class="score-card draws-card">
        <div class="score-label">empates</div>
        <div class="score-val" id="score-d">0</div>
      </div>
      <div class="score-card" id="card-o">
        <div class="score-label">Jugador O</div>
        <div class="score-val" id="score-o">0</div>
      </div>
    </div>

    <div class="status" id="status">Turno de X</div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <div class="btn-row">
      <button id="btn-reset">Nueva partida</button>
      <button id="btn-clear">Reiniciar marcador</button>
    </div>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board = Array(9).fill(null);
    let current = 'X';
    let over = false;
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return [a, b, c];
      }
      return null;
    }

    function render() {
      cells.forEach((cell, i) => {
        cell.textContent = board[i] || '';
        cell.className = 'cell'
          + (board[i] ? ' taken' : '')
          + (board[i] === 'X' ? ' x-cell' : board[i] === 'O' ? ' o-cell' : '');
      });
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
      document.getElementById('card-x').className = 'score-card' + (current === 'X' && !over ? ' active-x' : '');
      document.getElementById('card-o').className = 'score-card' + (current === 'O' && !over ? ' active-o' : '');
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;
        board[i] = current;
        const win = checkWin();
        if (win) {
          over = true;
          scores[current]++;
          win.forEach(idx => cells[idx].classList.add('win-cell'));
          status.textContent = `¡Gana el jugador ${current}!`;
        } else if (board.every(v => v)) {
          over = true;
          scores.D++;
          status.textContent = '¡Empate!';
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `Turno de ${current}`;
        }
        render();
      });
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      board = Array(9).fill(null);
      over = false;
      current = 'X';
      status.textContent = 'Turno de X';
      render();
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      scores = { X: 0, O: 0, D: 0 };
      board = Array(9).fill(null);
      over = false;
      current = 'X';
      status.textContent = 'Turno de X';
      render();
    });

    render();
  </script>
</body>
</html>
